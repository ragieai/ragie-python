dded**\n* `ragie.webhook_endpoints.create()`:  `response.secret` **Added**\n* `ragie.webhook_endpoints.get()`:  `response.secret` **Added**\n* `ragie.webhook_endpoints.update()`:  `response.secret` **Added**\n* `ragie.entities.list_extraction_logs()`: **Added**\n"
